<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grax Books — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080C;--bg2:#0C0E14;--bg3:#11131A;--bg4:#161820;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#E8E2D9;--text2:#7A7468;--text3:#3E3A34;
  --b1:#E8892A;--b2:#C45F10;--b3:#F4A64A;
  --glow:rgba(232,137,42,0.15);
  --red:#FF5E6C;--green:#2DD4A0;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}

/* LAYOUT SPLIT */
.shell{display:flex;min-height:100vh;}

/* LADO ESQUERDO — visual */
.left{
  flex:1;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center;
  padding:52px 56px;
  background:var(--bg2);
  border-right:1px solid var(--border);
}
.left::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 30% 50%,rgba(232,137,42,.08),transparent);
  pointer-events:none;
}
.left-noise{
  position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:.5;pointer-events:none;
}
.left-brand{display:flex;align-items:center;gap:10px;margin-bottom:60px;position:relative;z-index:1;}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.12em;}
.brand-name .g{color:var(--b3);}
.brand-name .b{color:rgba(232,226,217,.4);font-size:20px;letter-spacing:.18em;}
.left-tagline{
  font-family:'Instrument Serif',serif;
  font-size:clamp(32px,4vw,52px);
  line-height:1.15;
  color:var(--text);
  margin-bottom:20px;
  position:relative;z-index:1;
}
.left-tagline em{color:var(--b3);font-style:italic;}
.left-sub{
  font-size:15px;color:var(--text2);line-height:1.7;
  max-width:380px;position:relative;z-index:1;
}
.mascote-wrap{
  position:absolute;right:-20px;bottom:0;
  opacity:.7;pointer-events:none;
  filter:drop-shadow(0 0 40px rgba(232,137,42,.15));
}

/* LADO DIREITO — form */
.right{
  width:460px;flex-shrink:0;
  display:flex;flex-direction:column;justify-content:center;
  padding:52px 48px;
  position:relative;
  background:var(--bg);
}
.right::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--b1) 40%,var(--b3) 60%,transparent);
}
.form-head{margin-bottom:36px;}
.form-title{font-size:24px;font-weight:600;color:var(--text);margin-bottom:5px;}
.form-sub{font-size:14px;color:var(--text2);}
.tabs{display:flex;gap:0;background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:3px;margin-bottom:28px;}
.tab{flex:1;padding:9px;border-radius:9px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;}
.tab.on{background:linear-gradient(135deg,var(--b1),var(--b2));color:white;box-shadow:0 2px 8px rgba(232,137,42,.35);}
.fgroup{display:flex;flex-direction:column;gap:16px;margin-bottom:24px;}
.flabel{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:600;display:block;margin-bottom:6px;}
.finput{
  width:100%;background:var(--bg2);border:1px solid var(--border2);
  border-radius:11px;padding:13px 16px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.finput:focus{border-color:var(--b1);box-shadow:0 0 0 3px rgba(232,137,42,.12);}
.finput::placeholder{color:var(--text3);}
.finput-wrap{position:relative;}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;
  transition:color .15s;
}
.eye-btn:hover{color:var(--text2);}
.btn-submit{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--b1) 0%,var(--b2) 60%,#A03800 100%);
  color:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .25s;
  box-shadow:0 4px 18px rgba(232,137,42,.35), inset 0 1px 0 rgba(255,255,255,.15);
  position:relative;overflow:hidden;letter-spacing:.02em;
}
.btn-submit::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);
  pointer-events:none;
}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,137,42,.45);}
.btn-submit:active{transform:translateY(0);}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:12px;color:var(--text3);}
.form-footer{text-align:center;font-size:13px;color:var(--text3);margin-top:24px;}
.form-footer a{color:var(--b3);cursor:pointer;}
.form-footer a:hover{text-decoration:underline;}
.error-msg{
  background:rgba(255,94,108,.1);border:1px solid rgba(255,94,108,.2);
  color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;
  display:none;margin-bottom:14px;
}
.error-msg.show{display:block;}
.success-msg{
  background:rgba(45,212,160,.1);border:1px solid rgba(45,212,160,.2);
  color:var(--green);border-radius:8px;padding:10px 14px;font-size:13px;
  display:none;margin-bottom:14px;
}
.success-msg.show{display:block;}
/* Animação de entrada */
.right>*{animation:slideUp .4s ease both;}
.form-head{animation-delay:.05s;}
.tabs{animation-delay:.1s;}
.fgroup{animation-delay:.15s;}
.btn-submit{animation-delay:.2s;}
@keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
/* Mobile */
@media(max-width:768px){
  .shell{flex-direction:column;}
  .left{
    display:flex;flex-direction:row;
    flex:none;
    padding:20px 24px 18px;
    min-height:auto;
    border-right:none;
    border-bottom:1px solid var(--border);
    align-items:center;gap:12px;
  }
  .left::before{background:radial-gradient(ellipse 100% 200% at 20% 50%,rgba(232,137,42,.07),transparent);}
  .left-brand{margin-bottom:0;}
  .left-tagline{display:none;}
  .left-sub{display:none;}
  .mascote-wrap{
    position:relative;right:auto;bottom:auto;
    opacity:.9;
    height:54px;overflow:hidden;display:flex;align-items:flex-start;
  }
  .mascote-wrap svg{width:23px !important;height:54px !important;}
  .right{width:100%;padding:28px 22px 40px;flex:1;}
  .form-head{margin-bottom:22px;}
  .form-title{font-size:22px;}
  .tabs{margin-bottom:22px;}
}
</style>
</head>

        </div>

<script>
const API = 'https://web-production-65227.up.railway.app'; // trocar pela URL do Railway em produção

function switchTab(tab){
  document.getElementById('tabLogin').classList.toggle('on', tab==='login');
  document.getElementById('tabCadastro').classList.toggle('on', tab==='cadastro');
  document.getElementById('formLogin').style.display = tab==='login'?'':'none';
  document.getElementById('formCadastro').style.display = tab==='cadastro'?'':'none';
  document.getElementById('formTitle').textContent = tab==='login'?'Bem-vindo de volta':'Crie sua conta';
  document.getElementById('formSub').textContent = tab==='login'?'Entre na sua conta para continuar lendo':'Junte-se à Grax Books gratuitamente';
  hideMsg();
}

function togglePass(id, btn){
  const input = document.getElementById(id);
  input.type = input.type==='password'?'text':'password';
  btn.style.color = input.type==='text'?'var(--b3)':'var(--text3)';
}

function showErr(msg){ const e=$('errMsg'); e.textContent=msg; e.classList.add('show'); document.getElementById('sucMsg').classList.remove('show'); }
function showSuc(msg){ const e=$('sucMsg'); e.textContent=msg; e.classList.add('show'); document.getElementById('errMsg').classList.remove('show'); }
function hideMsg(){ document.getElementById('errMsg').classList.remove('show'); document.getElementById('sucMsg').classList.remove('show'); }
function $(id){ return document.getElementById(id); }

async function doLogin(){
  const email = $('loginEmail').value.trim();
  const senha = $('loginSenha').value;
  if(!email||!senha){ showErr('Preencha email e senha'); return; }
  try{
    const r = await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,senha})});
    const d = await r.json();
    if(!r.ok){ showErr(d.erro||'Erro ao fazer login'); return; }
    localStorage.setItem('grax_token', d.token);
    localStorage.setItem('grax_user', JSON.stringify(d.usuario));
    if(d.usuario.admin){ window.location.href='admin.html'; }
    else{ window.location.href='grax.html'; }
  } catch(e){
    // DEMO: sem backend, simular login
    showSuc('✓ Login simulado com sucesso! (conecte ao backend para login real)');
    setTimeout(()=>{ if(email==='wesleiiclod@gmail.com'){ window.location.href='admin.html'; } else { window.location.href='grax.html'; } }, 1500);

async function doCadastro(){
  const nome = $('cadNome').value.trim();
  const email = $('cadEmail').value.trim();
  const senha = $('cadSenha').value;
  if(!nome||!email||!senha){ showErr('Preencha todos os campos'); return; }
  if(senha.length<6){ showErr('Senha deve ter no mínimo 6 caracteres'); return; }
  try{
    const r = await fetch(API+'/auth/cadastro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,email,senha})});
    const d = await r.json();
    if(!r.ok){ showErr(d.erro||'Erro ao criar conta'); return; }
    localStorage.setItem('grax_token', d.token);
    localStorage.setItem('grax_user', JSON.stringify(d.usuario));
    window.location.href='grax.html';
  } catch(e){
    showSuc('✓ Conta criada com sucesso! (simulado — conecte ao backend)');
    setTimeout(()=>{ window.location.href='grax.html'; }, 1500);
  }
}

document.addEventListener('keydown', e=>{ if(e.key==='Enter') document.querySelector('.btn-submit:not([style*="none"])').click(); });
